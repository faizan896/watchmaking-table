<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>The Watchmaking Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#efe7d8;--muted:#a99e8c;--brass:#c8a24a;--sans:'Inter',system-ui,sans-serif;--serif:'Cormorant Garamond',Georgia,serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:var(--sans);color:var(--ink);cursor:default;
  background:radial-gradient(120% 100% at 50% 42%, #17110b 0%, #070503 72%)}
#c{position:fixed;inset:0;display:block;touch-action:none}
/* cinematic vignette */
#vig{position:fixed;inset:0;pointer-events:none;z-index:5;
  box-shadow:inset 0 0 220px 60px rgba(0,0,0,.72), inset 0 0 60px 10px rgba(0,0,0,.35);
  transition:opacity 1.6s ease}
/* caption — the interface almost disappears */
#cap{position:fixed;left:0;right:0;bottom:46px;z-index:8;text-align:center;pointer-events:none;
  opacity:0;transition:opacity .9s ease}
#cap .n{font-family:var(--serif);font-size:26px;letter-spacing:.01em}
#cap .h{font-size:11.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);margin-top:8px;font-weight:300}
#cap.on{opacity:1}
/* progress ticks */
#prog{position:fixed;left:50%;top:30px;transform:translateX(-50%);z-index:8;display:flex;gap:7px;opacity:0;transition:opacity 1s}
#prog.on{opacity:.9}
#prog i{width:6px;height:6px;border-radius:50%;background:rgba(239,231,216,.18);transition:.5s;display:block}
#prog i.done{background:var(--brass);box-shadow:0 0 9px rgba(200,162,74,.7)}
#prog i.cur{background:var(--ink);transform:scale(1.35)}
/* floating controls, only when needed */
.act{position:fixed;z-index:9;opacity:0;transform:translateY(8px);transition:.7s;pointer-events:none}
.act.on{opacity:1;transform:none;pointer-events:auto}
.btn{font-family:var(--sans);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink);
  border:1px solid rgba(239,231,216,.28);background:rgba(20,16,12,.5);backdrop-filter:blur(6px);
  padding:13px 26px;border-radius:2px;cursor:pointer;transition:.35s}
.btn:hover{border-color:var(--brass);color:#f6ecd6}
.btn.gold{background:var(--brass);color:#1a1207;border-color:var(--brass)}
.btn.gold:hover{box-shadow:0 0 30px rgba(200,162,74,.4)}
#finishActs{left:0;right:0;bottom:40px;display:flex;gap:12px;justify-content:center}
/* intro */
#intro{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background:radial-gradient(120% 100% at 50% 40%, #16110b 0%, #070503 72%);transition:opacity 1.4s ease}
#intro.gone{opacity:0;pointer-events:none}
#intro .k{font-size:11px;letter-spacing:.55em;text-transform:uppercase;color:var(--brass);margin-bottom:26px}
#intro h1{font-family:var(--serif);font-weight:500;font-size:clamp(46px,9vw,104px);line-height:1;letter-spacing:.01em}
#intro h1 em{font-style:italic;color:#e7cf8f}
#intro p{max-width:440px;margin:24px auto 0;color:var(--muted);font-size:14.5px;line-height:1.75;font-weight:300}
#sit{margin-top:42px;padding:15px 38px;border:1px solid var(--brass);color:#e7cf8f;letter-spacing:.28em;
  font-size:11px;text-transform:uppercase;background:none;border-radius:2px;cursor:pointer;transition:.4s}
#sit:hover{background:var(--brass);color:#1a1207;box-shadow:0 0 40px rgba(200,162,74,.35)}
#intro .f{position:absolute;bottom:24px;font-size:10px;letter-spacing:.34em;color:#5a5044;text-transform:uppercase}
#loading{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:#070503;
  color:var(--muted);font-size:11px;letter-spacing:.34em;text-transform:uppercase;transition:opacity .8s}
#loading.gone{opacity:0;pointer-events:none}
#err{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;text-align:center;
  background:#070503;color:var(--muted);font-size:13px;line-height:1.7;padding:40px}
#err.on{display:flex}
.hint-drag{position:fixed;z-index:8;pointer-events:none;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);opacity:0;transition:.6s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vig"></div>
<div id="prog"></div>
<div id="cap"><div class="n"></div><div class="h"></div></div>
<div class="act" id="finishActs">
  <button class="btn" id="orbitBtn">Turn slowly</button>
  <button class="btn gold" id="dlBtn">Download photograph</button>
  <button class="btn" id="againBtn">Begin again</button>
</div>

<div id="loading">Preparing the bench…</div>
<div id="err"></div>
<script>
/* fallback if the 3D engine can't load (offline / blocked CDN) */
window.__wmLoaded=false;
setTimeout(function(){
  if(!window.__wmLoaded){
    var e=document.getElementById('err');
    e.textContent="The 3D engine (Three.js) could not load. Please open this file in a desktop browser with an internet connection — the first load fetches the WebGL library from a CDN.";
    e.classList.add('on');document.getElementById('loading').classList.add('gone');
  }
},9000);
window.addEventListener('error',function(ev){
  if(ev&&ev.message&&/import|module|three/i.test(ev.message)&&!window.__wmLoaded){
    var e=document.getElementById('err');
    e.textContent="Something blocked the 3D engine from starting. Try a different desktop browser, or check that scripts from jsdelivr.net are allowed.";
    e.classList.add('on');document.getElementById('loading').classList.add('gone');
  }
});
</script>

<section id="intro">
  <div class="k">A Digital Craft Experience</div>
  <h1>The <em>Watchmaking</em> Table</h1>
  <p>Sit down at the bench. Take each part with the tweezers and build a mechanical movement by hand — until it draws its first breath.</p>
  <button id="sit">Sit at the bench</button>
  <div class="f">Best with sound · drag each component into place</div>
</section>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ===================================================================
   THE WATCHMAKING TABLE — true 3D (Three.js)
   Single file. Procedural materials, PBR, IBL, drag-assembly, mechanism.
   =================================================================== */
const CFG={
  DPRmax:2,
  gilt:0xd7c088, giltDark:0x9c8038,
  steel:0xc6ccd2, blued:0x2e4a86, ruby:0x86131f,
};
let renderer,scene,camera,controls,clock,pmrem;
let W=innerWidth,H=innerHeight;
const canvas=document.getElementById('c');
const $=s=>document.querySelector(s);

function fail(msg){const e=$('#err');e.textContent=msg;e.classList.add('on');$('#loading').classList.add('gone');}

function initCore(){
  // WebGL support
  try{
    renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,preserveDrawingBuffer:true});
  }catch(e){fail('This experience needs WebGL. Please open it in a modern desktop browser (Chrome, Safari, Edge, Firefox) with hardware acceleration enabled.');return false;}
  renderer.setPixelRatio(Math.min(devicePixelRatio,CFG.DPRmax));
  renderer.setSize(W,H);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.05;
  renderer.outputColorSpace=THREE.SRGBColorSpace;

  scene=new THREE.Scene();
  scene.background=null;

  // Image-based lighting from a soft studio room (no external asset)
  pmrem=new THREE.PMREMGenerator(renderer);
  const env=new RoomEnvironment(renderer);
  scene.environment=pmrem.fromScene(env,0.04).texture;
  env.dispose();

  camera=new THREE.PerspectiveCamera(34,W/H,0.1,400);
  camera.position.set(0,26,30);
  camera.lookAt(0,1.5,0);

  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;controls.dampingFactor=0.06;
  controls.target.set(0,1.5,0);
  controls.minDistance=14;controls.maxDistance=52;
  controls.minPolarAngle=0.15;controls.maxPolarAngle=Math.PI*0.49;
  controls.rotateSpeed=0.55;controls.zoomSpeed=0.7;
  controls.enablePan=false;
  controls.enabled=false; // enabled after intro

  clock=new THREE.Clock();
  addEventListener('resize',onResize);
  return true;
}
function onResize(){
  W=innerWidth;H=innerHeight;
  renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();
}

/* ===================================================================
   PROCEDURAL TEXTURES (canvas → no external assets)
   =================================================================== */
function cv(s){const c=document.createElement('canvas');c.width=c.height=s;return c;}
function tex(canvas,{srgb=false,rep=1}={}){const t=new THREE.CanvasTexture(canvas);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(rep,rep);t.anisotropy=8;
  if(srgb)t.colorSpace=THREE.SRGBColorSpace;t.needsUpdate=true;return t;}

function woodTextures(){
  const s=1024,c=cv(s),x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,s,s);g.addColorStop(0,'#4a2e1b');g.addColorStop(.5,'#3a2314');g.addColorStop(1,'#2c1a0f');
  x.fillStyle=g;x.fillRect(0,0,s,s);
  // long grain
  for(let i=0;i<520;i++){
    const y=Math.random()*s, amp=6+Math.random()*22, hue=Math.random();
    x.strokeStyle=`rgba(${hue<.5?'20,12,6':'92,62,34'},${0.05+Math.random()*0.12})`;
    x.lineWidth=0.6+Math.random()*1.6;x.beginPath();
    for(let px=0;px<=s;px+=16){const yy=y+Math.sin((px/s)*Math.PI*(1+Math.random())+i)*amp*0.3;px===0?x.moveTo(px,yy):x.lineTo(px,yy);}
    x.stroke();
  }
  // plank seams
  for(let p=1;p<4;p++){const px=p*s/4+(Math.random()*20-10);x.strokeStyle='rgba(0,0,0,.35)';x.lineWidth=2.4;x.beginPath();x.moveTo(px,0);x.lineTo(px,s);x.stroke();}
  // roughness
  const rc=cv(512),rx=rc.getContext('2d');rx.fillStyle='#8a8a8a';rx.fillRect(0,0,512,512);
  for(let i=0;i<9000;i++){rx.fillStyle=`rgba(${Math.random()<.5?0:255},0,0,${Math.random()*0.06})`;rx.fillRect(Math.random()*512,Math.random()*512,2,2);}
  return {map:tex(c,{srgb:true,rep:1}),rough:tex(rc,{rep:1})};
}
function leatherTextures(){
  const s=512,c=cv(s),x=c.getContext('2d');x.fillStyle='#241a12';x.fillRect(0,0,s,s);
  for(let i=0;i<26000;i++){const v=Math.random();x.fillStyle=`rgba(${v<.5?10:70},${v<.5?7:48},${v<.5?4:28},${Math.random()*0.5})`;x.fillRect(Math.random()*s,Math.random()*s,1.4,1.4);}
  // faint pebble veins
  for(let i=0;i<800;i++){x.strokeStyle='rgba(0,0,0,.18)';x.lineWidth=0.7;const px=Math.random()*s,py=Math.random()*s,r=3+Math.random()*7;
    x.beginPath();x.arc(px,py,r,0,Math.PI*2);x.stroke();}
  const bc=cv(s),bx=bc.getContext('2d');bx.fillStyle='#808080';bx.fillRect(0,0,s,s);
  for(let i=0;i<20000;i++){const g=Math.random()*255;bx.fillStyle=`rgba(${g},${g},${g},.5)`;bx.fillRect(Math.random()*s,Math.random()*s,2,2);}
  return {map:tex(c,{srgb:true,rep:3}),bump:tex(bc,{rep:3})};
}
function genevaBump(){ // côtes de Genève stripes for bridges
  const s=256,c=cv(s),x=c.getContext('2d');x.fillStyle='#808080';x.fillRect(0,0,s,s);
  x.save();x.translate(s/2,s/2);x.rotate(0.5);x.translate(-s,-s);
  for(let i=0;i<40;i++){const g=x.createLinearGradient(0,i*14,0,i*14+14);g.addColorStop(0,'#5a5a5a');g.addColorStop(.5,'#c8c8c8');g.addColorStop(1,'#5a5a5a');
    x.fillStyle=g;x.fillRect(0,i*14,s*2,13);}
  x.restore();
  return tex(c,{rep:1});
}
function sunburstTexture(hex){
  const s=512,c=cv(s),x=c.getContext('2d');const col='#'+new THREE.Color(hex).getHexString();
  x.fillStyle=col;x.fillRect(0,0,s,s);
  x.translate(s/2,s/2);
  for(let i=0;i<720;i++){x.rotate(Math.PI*2/720);x.strokeStyle=`rgba(255,255,255,${Math.random()*0.06})`;x.lineWidth=1;x.beginPath();x.moveTo(0,0);x.lineTo(0,s/2);x.stroke();
    x.strokeStyle=`rgba(0,0,0,${Math.random()*0.05})`;x.beginPath();x.moveTo(0,0);x.lineTo(0,s/2);x.stroke();}
  return tex(c,{srgb:true});
}

/* ===================================================================
   MATERIALS
   =================================================================== */
let MAT={};
function buildMaterials(){
  const wood=woodTextures(), leather=leatherTextures(), gv=genevaBump();
  MAT.wood=new THREE.MeshStandardMaterial({map:wood.map,roughnessMap:wood.rough,roughness:0.72,metalness:0.02});
  MAT.wood.map.repeat.set(2,1.4);MAT.wood.roughnessMap.repeat.set(2,1.4);
  MAT.leather=new THREE.MeshStandardMaterial({map:leather.map,bumpMap:leather.bump,bumpScale:0.04,roughness:0.9,metalness:0});
  MAT.gilt=new THREE.MeshStandardMaterial({color:CFG.gilt,metalness:1,roughness:0.32,envMapIntensity:1.1});
  MAT.giltStriped=new THREE.MeshStandardMaterial({color:CFG.gilt,metalness:1,roughness:0.34,bumpMap:gv,bumpScale:0.05,envMapIntensity:1.15});
  MAT.steel=new THREE.MeshStandardMaterial({color:CFG.steel,metalness:1,roughness:0.22,envMapIntensity:1.2});
  MAT.steelSat=new THREE.MeshStandardMaterial({color:0xb9bfc6,metalness:1,roughness:0.4,envMapIntensity:1});
  MAT.blued=new THREE.MeshStandardMaterial({color:CFG.blued,metalness:1,roughness:0.18,envMapIntensity:1.3});
  MAT.brass=new THREE.MeshStandardMaterial({color:0xb08a4a,metalness:1,roughness:0.42,envMapIntensity:1});
  MAT.dark=new THREE.MeshStandardMaterial({color:0x14100c,metalness:0.4,roughness:0.6});
  MAT.ruby=new THREE.MeshPhysicalMaterial({color:CFG.ruby,metalness:0,roughness:0.15,transmission:0.55,thickness:0.4,ior:1.76,envMapIntensity:1.4});
  MAT.sapphire=new THREE.MeshPhysicalMaterial({color:0xffffff,metalness:0,roughness:0.02,transmission:1,thickness:0.6,ior:1.52,clearcoat:1,clearcoatRoughness:0.02,envMapIntensity:1.5});
  MAT.lume=new THREE.MeshStandardMaterial({color:0xcfeede,emissive:0x2c5a44,emissiveIntensity:0.5,roughness:0.6,metalness:0});
  MAT.sunburst=hex=>new THREE.MeshStandardMaterial({map:sunburstTexture(hex),metalness:0.75,roughness:0.38,envMapIntensity:1});
  MAT.dialMatte=hex=>new THREE.MeshStandardMaterial({color:hex,metalness:0.1,roughness:0.7});
}

/* ===================================================================
   WORLD: desk, mat, holder, trays, tools, lamp, dust
   =================================================================== */
let dust, lampSpot, ASSEM={x:0,y0:1.25,z:0}, holderTopY=1.0;
const MR=5; // movement outer radius (units)

function buildWorld(){
  buildMaterials();
  // desk
  const desk=new THREE.Mesh(new THREE.BoxGeometry(160,8,110),MAT.wood);
  desk.position.y=-4;desk.receiveShadow=true;scene.add(desk);
  // leather work mat (rounded)
  const mat=new THREE.Mesh(roundedBox(56,0.7,40,2.2),MAT.leather);
  mat.position.y=0.35;mat.receiveShadow=true;scene.add(mat);
  // stitched border (thin line loop)
  const stitch=new THREE.Mesh(new THREE.TorusGeometry(1,1,4,4),MAT.dark);stitch.visible=false;scene.add(stitch);

  buildHolder();
  buildTrays();
  buildTools();
  buildLamp();
  buildDust();
}

function roundedBox(w,h,d,r){
  const shape=new THREE.Shape();const x=-w/2,y=-d/2,ww=w,dd=d;
  shape.moveTo(x+r,y);shape.lineTo(x+ww-r,y);shape.quadraticCurveTo(x+ww,y,x+ww,y+r);
  shape.lineTo(x+ww,y+dd-r);shape.quadraticCurveTo(x+ww,y+dd,x+ww-r,y+dd);
  shape.lineTo(x+r,y+dd);shape.quadraticCurveTo(x,y+dd,x,y+dd-r);
  shape.lineTo(x,y+r);shape.quadraticCurveTo(x,y,x+r,y);
  const g=new THREE.ExtrudeGeometry(shape,{depth:h,bevelEnabled:true,bevelThickness:0.12,bevelSize:0.12,bevelSegments:2,steps:1});
  g.rotateX(-Math.PI/2);g.translate(0,h/2,0);g.computeVertexNormals();return g;
}

function buildHolder(){
  const g=new THREE.Group();
  const base=new THREE.Mesh(new THREE.CylinderGeometry(MR+2.6,MR+3.2,1.6,64),MAT.steelSat);
  base.position.y=0.7+0.35;base.castShadow=base.receiveShadow=true;g.add(base);
  const pot=new THREE.Mesh(new THREE.CylinderGeometry(MR+0.6,MR+0.6,0.9,64,1,true),MAT.steel);
  pot.position.y=holderTopY+0.9;pot.castShadow=true;g.add(pot);
  const floor=new THREE.Mesh(new THREE.CircleGeometry(MR+0.6,64),MAT.dark);
  floor.rotation.x=-Math.PI/2;floor.position.y=holderTopY+0.46;g.add(floor);
  g.position.set(ASSEM.x,0,ASSEM.z);scene.add(g);
}

function buildTrays(){
  [[-18,6],[18,6],[0,15]].forEach(([tx,tz])=>{
    const tray=new THREE.Group();
    const ring=new THREE.Mesh(new THREE.TorusGeometry(4.4,0.5,16,48),MAT.brass);
    ring.rotation.x=Math.PI/2;ring.position.y=0.9;ring.castShadow=true;tray.add(ring);
    const flr=new THREE.Mesh(new THREE.CircleGeometry(4.4,48),new THREE.MeshStandardMaterial({color:0x1c130b,roughness:0.8,metalness:0.2}));
    flr.rotation.x=-Math.PI/2;flr.position.y=0.72;flr.receiveShadow=true;tray.add(flr);
    // tiny screws scattered
    for(let i=0;i<5;i++){const s=screw(0.34);s.position.set((Math.random()-.5)*5,0.8,(Math.random()-.5)*5);s.rotation.y=Math.random()*6;tray.add(s);}
    tray.position.set(tx,0,tz);scene.add(tray);
  });
}

function screw(r){
  const g=new THREE.Group();
  const head=new THREE.Mesh(new THREE.CylinderGeometry(r,r,r*0.5,20),MAT.blued);head.castShadow=true;g.add(head);
  const slot=new THREE.Mesh(new THREE.BoxGeometry(r*1.7,r*0.12,r*0.34),MAT.dark);slot.position.y=r*0.26;g.add(slot);
  return g;
}

function buildTools(){
  // brass tweezers
  const tw=new THREE.Group();
  const a=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.34,13,8),MAT.brass);
  const b=a.clone();a.geometry=new THREE.CylinderGeometry(0.05,0.34,13,8);
  a.position.set(0.35,0,0);b.position.set(-0.35,0,0);a.rotation.z=0.06;b.rotation.z=-0.06;
  a.castShadow=b.castShadow=true;tw.add(a,b);
  tw.rotation.set(0,0.5,Math.PI/2);tw.position.set(-15,0.9,-9);tw.rotation.z=Math.PI/2-0.3;
  tw.rotation.y=0.7;scene.add(tw);

  // screwdriver
  const sd=new THREE.Group();
  const handle=new THREE.Mesh(new THREE.CylinderGeometry(0.9,0.9,7,24),new THREE.MeshStandardMaterial({color:0x8b1a1a,metalness:0.2,roughness:0.5}));
  const collar=new THREE.Mesh(new THREE.CylinderGeometry(0.95,0.95,0.6,24),MAT.steel);collar.position.y=-3.6;
  const shaft=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,7,16),MAT.steel);shaft.position.y=-7.3;
  const tip=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.02,0.7,12),MAT.steel);tip.position.y=-11;
  handle.castShadow=shaft.castShadow=true;sd.add(handle,collar,shaft,tip);
  sd.rotation.z=Math.PI/2;sd.position.set(16,1.1,-10);sd.rotation.y=0.4;scene.add(sd);

  // loupe
  const lp=new THREE.Group();
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(2.2,2.2,3.2,32,1,true),MAT.dark);
  const lens=new THREE.Mesh(new THREE.CylinderGeometry(2.1,2.1,0.3,32),MAT.sapphire);lens.position.y=1.4;
  barrel.castShadow=true;lp.add(barrel,lens);
  lp.position.set(-17,1.6,9);lp.rotation.z=0.25;scene.add(lp);

  // dust blower
  const bl=new THREE.Group();
  const bulb=new THREE.Mesh(new THREE.SphereGeometry(2.4,24,20),new THREE.MeshStandardMaterial({color:0x111,roughness:0.55,metalness:0}));
  bulb.scale.set(1,0.9,1.2);const noz=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.5,3,16),new THREE.MeshStandardMaterial({color:0x111,roughness:0.5}));
  noz.position.set(0,0.4,2.4);noz.rotation.x=1.3;bulb.castShadow=true;bl.add(bulb,noz);
  bl.position.set(17,2.2,9);scene.add(bl);

  // pegwood
  const peg=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.05,10,12),new THREE.MeshStandardMaterial({color:0xcaa46a,roughness:0.8,metalness:0}));
  peg.castShadow=true;peg.rotation.z=Math.PI/2;peg.position.set(-4,0.9,13);peg.rotation.y=0.3;scene.add(peg);
}

function buildLamp(){
  const grp=new THREE.Group();
  const foot=new THREE.Mesh(new THREE.CylinderGeometry(3,3.4,0.8,32),MAT.steelSat);foot.position.set(-26,0.4,-16);grp.add(foot);

function buildDust(){

  const m=new THREE.PointsMaterial({size:0.28,map:new THREE.CanvasTexture(spr),transparent:true,opacity:0.5,depthWrite:false,blending:THREE.AdditiveBlending});

function updateDust(dt,t){
  if(!dust)return;const p=dust.geometry.attributes.position,spd=dust.userData.spd;
  for(let i=0;i<spd.length;i++){let y=p.getY(i)+spd[i]*dt;let x=p.getX(i)+Math.sin(t*0.3+i)*0.004;
    if(y>23)y=0;p.setY(i,y);p.setX(i,x);}
  p.needsUpdate=true;
}

function makeGear({teeth=40,rTip=3,rRoot=2.7,rHub=0.7,holeR=0.28,thick=0.34,mat=MAT.gilt,lighten=0,spokes=0}){
  const shape=new THREE.Shape();const step=Math.PI*2/teeth;
  for(let i=0;i<teeth;i++){
    const a=i*step;
    const p=[[rRoot,a],[rTip,a+step*0.16],[rTip,a+step*0.42],[rRoot,a+step*0.58]];
    p.forEach(([r,ang],k)=>{const x=Math.cos(ang)*r,y=Math.sin(ang)*r;(i===0&&k===0)?shape.moveTo(x,y):shape.lineTo(x,y);});
  }
  shape.closePath();
  const hole=new THREE.Path();hole.absarc(0,0,holeR,0,Math.PI*2,true);shape.holes.push(hole);
  if(lighten>0){const rr=(rHub+rRoot)/2, hr=(rRoot-rHub)*0.32;
    for(let i=0;i<lighten;i++){const a=i/lighten*Math.PI*2;const h=new THREE.Path();
      h.absarc(Math.cos(a)*rr,Math.sin(a)*rr,hr,0,Math.PI*2,true);shape.holes.push(h);}}
  const g=new THREE.ExtrudeGeometry(shape,{depth:thick,bevelEnabled:true,bevelThickness:0.05,bevelSize:0.05,bevelSegments:2,steps:1,curveSegments:24});
  g.rotateX(-Math.PI/2);g.translate(0,thick/2,0);g.computeVertexNormals();
  const grp=new THREE.Group();
  const mesh=new THREE.Mesh(g,mat);mesh.castShadow=mesh.receiveShadow=true;grp.add(mesh);
  const hub=new THREE.Mesh(new THREE.CylinderGeometry(rHub,rHub*1.1,thick+0.5,20),MAT.steel);hub.position.y=thick/2;hub.castShadow=true;grp.add(hub);
  const arbor=new THREE.Mesh(new THREE.CylinderGeometry(holeR*0.7,holeR*0.7,thick+1.4,12),MAT.steel);arbor.position.y=thick/2;grp.add(arbor);
  if(spokes>0){for(let i=0;i<spokes;i++){const a=i/spokes*Math.PI*2;
    const s=new THREE.Mesh(new THREE.BoxGeometry(rRoot*0.9,thick*0.7,0.28),mat);
    s.position.set(0,thick/2,0);s.rotation.y=a;s.translateX(rRoot*0.45);grp.add(s);}}
  return grp;
}

/* ===================================================================
   TWEEN SYSTEM
   =================================================================== */
let tweens=[];
const easeInOut=t=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const easeOut=t=>1-Math.pow(1-t,3);
function addTween(o){o.t=0;o.ease=o.ease||easeInOut;tweens.push(o);return o;}
function updateTweens(dt){
  for(let i=tweens.length-1;i>=0;i--){const tw=tweens[i];tw.t+=dt;let f=Math.min(tw.t/tw.dur,1);
    tw.update(tw.ease(f));if(f>=1){tweens.splice(i,1);tw.done&&tw.done();}}
}
function tweenCamera(pos,tgt,dur=1.6,ease=easeInOut,done){
  const sp=camera.position.clone(),st=controls.target.clone();controls.enabled=false;
  addTween({dur,ease,update(f){camera.position.lerpVectors(sp,pos,f);controls.target.lerpVectors(st,tgt,f);},
    done(){controls.target.copy(tgt);done&&done();}});
}

/* ===================================================================
   AUDIO — synthesized, subtle
   =================================================================== */
let AC=null;
function ac(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(AC&&AC.state==='suspended')AC.resume();return AC;}
function blip(freq,dur,vol,type='triangle',q=6){const a=ac();if(!a)return;
  const o=a.createOscillator(),g=a.createGain(),f=a.createBiquadFilter();
  f.type='bandpass';f.frequency.value=freq;f.Q.value=q;o.type=type;o.frequency.value=freq;
  o.connect(f);f.connect(g);g.connect(a.destination);const t=a.currentTime;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.002);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t);o.stop(t+dur+0.02);}
const sClick=()=>{blip(340,0.08,0.16,'square',4);setTimeout(()=>blip(1500,0.05,0.07),35);};
const sTick=(hi)=>blip(hi?2700:2350,0.028,0.05,'triangle',8);
const sSoft=()=>blip(180,0.12,0.05,'sine',2);

/* ===================================================================
   INTERACTION — raycast drag, order gating, magnetic snap
   =================================================================== */
let ray,ndc,dragPlane,drag=null,currentIndex=0,socket,started=false,liftY;
function initInteraction(){
  ray=new THREE.Raycaster();ndc=new THREE.Vector2();
  liftY=ASSEM.y0+7;
  dragPlane=new THREE.Plane(new THREE.Vector3(0,1,0),-liftY);
  const ringGeo=new THREE.TorusGeometry(2.4,0.09,10,60);
  socket=new THREE.Mesh(ringGeo,new THREE.MeshBasicMaterial({color:0xe7cf8f,transparent:true,opacity:0}));
  socket.rotation.x=Math.PI/2;scene.add(socket);
  const dom=renderer.domElement;
  dom.addEventListener('pointerdown',onDown);
  addEventListener('pointermove',onMove);
  addEventListener('pointerup',onUp);
}
function setPointer(e){ndc.x=(e.clientX/W)*2-1;ndc.y=-(e.clientY/H)*2+1;}
function activePart(){return PARTS[currentIndex];}
function focusPart(){
  const p=activePart();if(!p){return;}
  socket.position.set(p.target.x,p.target.y+0.15,p.target.z);
  const rr=Math.max(2,p.snapR*0.62);socket.scale.setScalar(rr/2.4);
  caption(p.name,p.hint);
  updateProgress();
}
function onDown(e){
  if(!started||drag)return;const p=activePart();if(!p)return;
  setPointer(e);ray.setFromCamera(ndc,camera);
  const hit=ray.intersectObject(p.group,true);
  if(hit.length){
    drag={p,last:p.group.position.clone(),vx:0,vz:0,yaw:0};
    controls.enabled=false;sSoft();
  }
}
function onMove(e){if(drag)setPointer(e);}
function updateDrag(){
  if(!drag)return;ray.setFromCamera(ndc,camera);
  const pt=new THREE.Vector3();
  if(ray.ray.intersectPlane(dragPlane,pt)){
    const g=drag.p.group;
    drag.vx=pt.x-g.position.x;drag.vz=pt.z-g.position.z;
    g.position.set(pt.x,liftY,pt.z);
    drag.yaw+=0.02;
    // lift, slight motion tilt (weighty, no bounce)
    const tiltX=THREE.MathUtils.clamp(-drag.vz*0.06,-0.25,0.25);
    const tiltZ=THREE.MathUtils.clamp(drag.vx*0.06,-0.25,0.25);
    g.quaternion.setFromEuler(new THREE.Euler(tiltX,drag.yaw,tiltZ));
  }
}
function onUp(){
  if(!drag)return;const {p}=drag;const g=p.group;
  const dx=g.position.x-p.target.x, dz=g.position.z-p.target.z;
  const dist=Math.hypot(dx,dz);
  const home=drag;drag=null;
  if(dist<=p.snapR){snapIn(p);}else{returnHome(p);controls.enabled=(currentIndex<PARTS.length);}
}
function snapIn(p){
  const g=p.group;const sp=g.position.clone(),sq=g.quaternion.clone();
  socketFade(0);
  addTween({dur:0.55,ease:easeInOut,
    update(f){g.position.lerpVectors(sp,p.target,f);g.quaternion.slerpQuaternions(sq,p.targetQuat,f);},
    done(){g.position.copy(p.target);g.quaternion.copy(p.targetQuat);sClick();onInstalled(p);}});
}
function returnHome(p){
  const g=p.group;const sp=g.position.clone(),sq=g.quaternion.clone();
  addTween({dur:0.6,ease:easeOut,update(f){g.position.lerpVectors(sp,p.home,f);g.quaternion.slerpQuaternions(sq,p.homeQuat,f);}});
}
function socketFade(to){const m=socket.material;const from=m.opacity;addTween({dur:0.5,update(f){m.opacity=from+(to-from)*f;}});}

let socketPulse=0;
function updateSocket(dt){
  if(!started||!activePart()||drag)return;
  socketPulse+=dt;socket.material.opacity=0.35+Math.sin(socketPulse*2.2)*0.28;
  // gentle bob on the active part while it waits in the tray
  const p=activePart();if(p&&!p.installed){p.group.position.y=p.home.y+Math.sin(socketPulse*1.6)*0.18;}
}

/* ===================================================================
   INSTALL FLOW + MECHANISM
   =================================================================== */
let mech={running:false,armed:false,beat:0,hands:false,handObj:null,spins:[]};
function onInstalled(p){
  p.installed=true;
  if(p.spin){if(p.spin.type==='lever')p.group.userData.base=p.group.rotation.y;mech.spins.push({obj:p.group,def:p.spin});}
  if(p.tellsTime){mech.hands=true;mech.handObj=p.group.userData.hands;}
  currentIndex++;
  if(p.hero){magicMoment();}
  if(p.cases){caseCinematic();}
  if(currentIndex>=PARTS.length){finishAssembly();return;}
  if(!p.hero){ // hero handles its own camera; others just advance
    focusPart();socketFade(1);
    controls.enabled=true;
  }
}
function magicMoment(){
  // everything pauses, camera pushes in on the balance
  caption('The Balance','…');
  socketFade(0);controls.enabled=false;
  const bpos=activePartTargetWorld(PARTS.find(p=>p.id==='balance'));
  tweenCamera(new THREE.Vector3(bpos.x+3,bpos.y+7,bpos.z+11),new THREE.Vector3(bpos.x,bpos.y,bpos.z),2.0,easeInOut,()=>{
    setTimeout(()=>{sTick(true);nudgeBalance();},700);
    setTimeout(()=>{sTick(false);nudgeBalance();},1150);
    setTimeout(()=>{sTick(true);mech.running=true;mech.armed=true;caption('It breathes','The movement is alive');},1650);
    setTimeout(()=>{ // ease back out to admire, then continue
      tweenCamera(new THREE.Vector3(0,18,24),new THREE.Vector3(0,ASSEM.y0+1.5,0),2.4,easeInOut,()=>{
        focusPart();socketFade(1);controls.enabled=true;});
    },3200);
  });
}
function nudgeBalance(){const b=mech.spins.find(s=>s.def.type==='balance');if(b)b.obj.rotation.y=0.5;}
function activePartTargetWorld(p){return new THREE.Vector3(p.target.x,p.target.y,p.target.z);}

function updateMechanism(dt,t){
  updateSocket(dt);
  if(mech.running){
    mech.beat+=dt;const period=0.25;
    if(mech.beat>=period){mech.beat-=period;mech.tickHi=!mech.tickHi;sTick(mech.tickHi);
      const esc=mech.spins.find(s=>s.def.type==='escape');if(esc)esc.obj.rotation.y+=Math.PI*2/20/2;}
    for(const s of mech.spins){
      if(s.def.type==='balance')s.obj.rotation.y=Math.sin(t*Math.PI*2*2.5)*0.6;
      else if(s.def.type==='lever')s.obj.rotation.y=(s.obj.userData.base||0)+Math.sin(t*Math.PI*2*2.5)*0.12;
      else if(s.def.type==='wheel')s.obj.rotation.y+=s.def.speed*dt*0.15;
    }
    if(mech.hands&&mech.handObj){
      const d=new Date();const sec=d.getSeconds()+d.getMilliseconds()/1000;
      const min=d.getMinutes()+sec/60, hr=(d.getHours()%12)+min/60;
      mech.handObj.sec.rotation.y=-sec/60*Math.PI*2;
      mech.handObj.min.rotation.y=-min/60*Math.PI*2;
      mech.handObj.hour.rotation.y=-hr/12*Math.PI*2;
    }
  }
}

/* ===================================================================
   CINEMATIC FINISH + EXPORT
   =================================================================== */
let autoTurn=false,finished=false;
function caseCinematic(){
  caption('Cased','A movement becomes a watch');
  controls.enabled=false;
  tweenCamera(new THREE.Vector3(13,12,18),new THREE.Vector3(0,ASSEM.y0+1.5,0),2.2,easeInOut,()=>{
    focusPart();socketFade(1);controls.enabled=true;});
}
function finishAssembly(){
  finished=true;socketFade(0);caption('','');
  document.getElementById('cap').classList.remove('on');
  controls.enabled=false;autoTurn=true;
  // dim to a hero product light
  addTween({dur:2.0,update(f){lampSpot.intensity=900+f*500;renderer.toneMappingExposure=1.05+f*0.15;}});
  document.getElementById('vig').style.opacity='1.2';
  tweenCamera(new THREE.Vector3(9,10,17),new THREE.Vector3(0,ASSEM.y0+1.4,0),2.6,easeInOut,()=>{
    controls.enabled=true;controls.autoRotate=true;controls.autoRotateSpeed=0.6;
    document.getElementById('finishActs').classList.add('on');
    caption('Your Timepiece','Turn it in the light — or take the photograph');
  });
}

function downloadPhoto(){
  const wRatio=1600,hRatio=2000;const oldW=W,oldH=H;
  renderer.setSize(wRatio,hRatio,false);camera.aspect=wRatio/hRatio;camera.updateProjectionMatrix();
  renderer.render(scene,camera);
  const url=renderer.domElement.toDataURL('image/png');
  const a=document.createElement('a');a.href=url;a.download='watchmaking-table.png';a.click();
  renderer.setSize(oldW,oldH,false);camera.aspect=oldW/oldH;camera.updateProjectionMatrix();
  toastMsg('Photograph saved');
}

/* ===================================================================
   UI
   =================================================================== */
function caption(n,h){const c=document.getElementById('cap');c.querySelector('.n').textContent=n;c.querySelector('.h').textContent=h;
  if(n||h)c.classList.add('on');else c.classList.remove('on');}
function toastMsg(m){caption(m,'');setTimeout(()=>{if(finished)caption('Your Timepiece','Turn it in the light — or take the photograph');},1600);}
function buildProgress(){const p=document.getElementById('prog');PARTS.forEach(()=>{const i=document.createElement('i');p.appendChild(i);});p.classList.add('on');}
function updateProgress(){const nodes=document.querySelectorAll('#prog i');nodes.forEach((n,i)=>{n.className='';if(i<currentIndex)n.classList.add('done');else if(i===currentIndex)n.classList.add('cur');});}
function wireUI(){
  document.getElementById('sit').addEventListener('click',startExperience);
  document.getElementById('dlBtn').addEventListener('click',downloadPhoto);
  document.getElementById('orbitBtn').addEventListener('click',()=>{controls.autoRotate=!controls.autoRotate;
    document.getElementById('orbitBtn').textContent=controls.autoRotate?'Hold still':'Turn slowly';});
  document.getElementById('againBtn').addEventListener('click',()=>location.reload());
}
function startExperience(){
  ac();sSoft();
  document.getElementById('intro').classList.add('gone');
  buildProgress();
  tweenCamera(new THREE.Vector3(0,18,24),new THREE.Vector3(0,ASSEM.y0+1.5,0),2.6,easeInOut,()=>{
    started=true;controls.enabled=true;focusPart();socketFade(1);
  });
}

/*__APPEND__*/

/* ===================================================================
   RENDER LOOP
   =================================================================== */
function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;
  if(controls)controls.update();
  if(typeof updateTweens==='function') updateTweens(dt);
  if(typeof updateDrag==='function') updateDrag();
  if(typeof updateMechanism==='function') updateMechanism(dt,t);
  if(typeof updateDust==='function') updateDust(dt,t);
  renderer.render(scene,camera);
}

/* ===================================================================
   BOOT
   =================================================================== */
function boot(){
  window.__wmLoaded=true;
  if(!initCore())return;
  buildWorld();          // bench, tools, lamp, dust
  buildParts();          // movement + finishing parts, placed in trays
  initInteraction();     // raycast drag + snap + order
  wireUI();
  $('#loading').classList.add('gone');
  tick();
}
boot();
</script>
